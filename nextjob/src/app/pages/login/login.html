<div class="auth-page">

  <div class="auth-left">
    <h1>Find the right job.</h1>
    <p>Smarter search. Better matches. Faster hiring.</p>
  </div>

  <div class="auth-right">
    <div class="auth-container">

      <h2>{{ isRegisterMode ? 'Register' : 'Login' }}</h2>

      <form (ngSubmit)="onSubmit($event)">

        <input 
          *ngIf="isRegisterMode"
          type="text"
          placeholder="Full Name"
          [(ngModel)]="name"
          name="name"
          required />

        <input 
          type="email"
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
          required />

        <input 
          type="password"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required />

        <button type="submit">
          {{ isRegisterMode ? 'Register' : 'Login' }}
        </button>

      </form>

      <p>
        {{ isRegisterMode ? 'Already have an account?' : "Don't have an account?" }}
        <a (click)="toggleMode()" style="cursor: pointer;">
          {{ isRegisterMode ? 'Login' : 'Register' }}
        </a>
      </p>

    </div>
  </div>

</div>


<app-toast
  [message]="toastMessage"
  [type]="toastType"
  [visible]="showToast">
</app-toast>
